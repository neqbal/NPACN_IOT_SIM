<!DOCTYPE html>
<html>

<head>
    <title>Smart Home Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .device-card {
            border: 1px solid #ccc;
            padding: 15px;
            width: 350px;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
            border-radius: 3px;
            border: 1px solid #888;
        }

        .btn-on {
            background: #d4edda;
        }

        .btn-off {
            background: #f8d7da;
        }

        .log-container {
            margin-top: 15px;
        }

        .log {
            color: #555;
            white-space: pre-wrap;
            background: #f9f9f9;
            padding: 10px;
            height: 180px;
            overflow-y: scroll;
            border: 1px inset #ccc;
            font-family: monospace;
        }

        .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
    </style>
</head>

<body>

    <div class="device-card">
        <div class="title-bar">
            <h2>Smart Home</h2>
            <small>Logged in as: <strong id="userDisplay">...</strong></small>
        </div>

        <div style="margin-bottom: 15px; border-bottom: 1px dashed #ccc; padding-bottom: 15px;">
            <p>Device: <strong>fan1</strong></p>
            <button class="btn-on" onclick="sendCommand('fan1', 'ON')">Turn ON Fan</button>
            <button class="btn-off" onclick="sendCommand('fan1', 'OFF')">Turn OFF Fan</button>
        </div>

        <div style="margin-bottom: 15px;">
            <p>Device: <strong>light1</strong></p>
            <button class="btn-on" onclick="sendCommand('light1', 'ON')">Turn ON Light</button>
            <button class="btn-off" onclick="sendCommand('light1', 'OFF')">Turn OFF Light</button>
        </div>

        <div class="log-container">
            <strong>Global Event Feed:</strong>
            <div class="log" id="statusLog">Waiting for connection...</div>
        </div>
    </div>

    <script>
        // Prompt for username identification upon landing
        let username = prompt("Enter your username to manage devices:", "admin");
        let password = prompt("Enter your password:", "password123");
        if (!username) username = "Anonymous";
        document.getElementById("userDisplay").innerText = username;

        let ws = new WebSocket("wss://localhost:8765");
        let isAuthenticated = false;

        ws.onmessage = function (event) {
            let logDiv = document.getElementById("statusLog");
            let txt = `[${new Date().toLocaleTimeString()}] ` + event.data;
            logDiv.innerText = txt + "\n" + logDiv.innerText;

            if (event.data.startsWith("AUTH_SUCCESS")) {
                isAuthenticated = true;
            }
        };

        ws.onopen = function () {
            document.getElementById("statusLog").innerText = "Successfully connected to WebSocket hub.\n";
            ws.send("AUTH:" + username + ":" + password);
        };

        function sendCommand(device_id, action) {
            if (!isAuthenticated) {
                alert("Not authenticated! Please refresh to login.");
                return;
            }
            // Updated Format matching the backend: CMD:<username>:<device_id>:<action>
            ws.send("CMD:" + username + ":" + device_id + ":" + action);
        }
    </script>

</body>

</html>
